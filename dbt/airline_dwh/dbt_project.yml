name: "airline_dwh"
version: "1.0.0"
config-version: 2

profile: "airline_dwh"

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

vars:
  lookback_days: 3  # incremental late-data window for fact_flights

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  airline_dwh:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts

seeds:
  airline_dwh:
    +schema: raw
