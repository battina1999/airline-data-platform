# ==================================================================
# Local production-like stack:
#   - postgres        : Airflow metadata database
#   - airflow-init    : one-shot db migration + admin user
#   - airflow-*       : webserver (UI) + scheduler running the DAG
#   - dashboard       : Streamlit analytics app on the DuckDB marts
#
# Quick start:  docker compose up -d   ->  Airflow at http://localhost:8080
#               Dashboard at http://localhost:8501
# ==================================================================
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.10
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/project/airflow/dags
    PROJECT_DIR: /opt/airflow/project
    _PIP_ADDITIONAL_REQUIREMENTS: "duckdb>=1.1 dbt-core>=1.8 dbt-duckdb>=1.8 great-expectations>=0.18 pandas>=2.0 Faker>=24.0 tabulate>=0.9 python-dotenv>=1.0"
  volumes:
    - ./:/opt/airflow/project
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin \
          --firstname admin --lastname admin --role Admin --email admin@example.com

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  dashboard:
    build: .
    command: bash -lc "make pipeline && streamlit run dashboards/streamlit_app.py --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - ./:/app

volumes:
  postgres-db:
  airflow-logs:
