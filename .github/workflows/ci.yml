name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Unit tests (ingestion, generator, BTS adapter)
        run: python -m pytest -q

      - name: End-to-end pipeline on the real-format sample
        # ingest -> Great Expectations -> dbt build (models+tests+snapshot) -> reconcile,
        # against the committed real-schema BTS sample.
        env:
          DATA_SOURCE: bts
          BTS_DATA_DIR: ${{ github.workspace }}/tests/fixtures/bts_sample
        run: python -m orchestration.run_pipeline

      - name: Source freshness
        run: cd dbt/airline_dwh && dbt source freshness --profiles-dir .

      - name: End-to-end pipeline on synthetic data (regression)
        run: python -m orchestration.run_pipeline
