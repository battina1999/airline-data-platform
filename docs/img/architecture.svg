<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 790" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1120" height="790" fill="#f8fafc"/>
  <text x="560" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">AI-Ready Airline Data Pipeline &amp; Analytics Platform</text>
  <text x="560" y="66" text-anchor="middle" font-size="14" fill="#64748b">End-to-end batch: ingest → validate → model → reconcile → visualize · local-first (DuckDB) &amp; cloud-ready (Snowflake)</text>

  <!-- Docker boundary -->
  <rect x="205" y="88" width="690" height="628" rx="14" fill="none" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="216" y="106" font-size="12" font-weight="700" fill="#0284c7">Docker Compose</text>

  <!-- Airflow rail -->
  <rect x="30" y="150" width="150" height="500" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="105" y="386" text-anchor="middle" font-size="15" font-weight="700" fill="#6d28d9">Apache</text>
  <text x="105" y="406" text-anchor="middle" font-size="15" font-weight="700" fill="#6d28d9">Airflow</text>
  <text x="105" y="430" text-anchor="middle" font-size="11" fill="#7c3aed">DAG orchestrates</text>
  <text x="105" y="446" text-anchor="middle" font-size="11" fill="#7c3aed">the daily run</text>
  <path d="M180,400 L206,400" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Data Quality rail -->
  <rect x="940" y="330" width="150" height="250" rx="12" fill="#ffe4e6" stroke="#f43f5e" stroke-width="2"/>
  <text x="1015" y="356" text-anchor="middle" font-size="14" font-weight="700" fill="#be123c">Data Quality</text>
  <rect x="955" y="372" width="120" height="86" rx="8" fill="#fff" stroke="#fb7185"/>
  <text x="1015" y="404" text-anchor="middle" font-size="12" font-weight="600" fill="#9f1239">Great</text>
  <text x="1015" y="420" text-anchor="middle" font-size="12" font-weight="600" fill="#9f1239">Expectations</text>
  <text x="1015" y="440" text-anchor="middle" font-size="10" fill="#e11d48">raw-layer checks</text>
  <rect x="955" y="470" width="120" height="92" rx="8" fill="#fff" stroke="#fb7185"/>
  <text x="1015" y="502" text-anchor="middle" font-size="12" font-weight="600" fill="#9f1239">Reconciliation</text>
  <text x="1015" y="522" text-anchor="middle" font-size="10" fill="#e11d48">source → target</text>
  <text x="1015" y="537" text-anchor="middle" font-size="10" fill="#e11d48">row counts</text>
  <path d="M940,415 L895,415" stroke="#f43f5e" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <path d="M940,515 L895,515" stroke="#f43f5e" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

  <!-- Sources -->
  <text x="550" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">DATA SOURCES</text>
  <g font-size="13" font-weight="600" fill="#1e40af">
    <rect x="220" y="140" width="150" height="62" rx="9" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="295" y="167" text-anchor="middle">Flights</text>
    <text x="295" y="186" text-anchor="middle" font-size="10" font-weight="400" fill="#3b82f6">operational feed</text>
    <rect x="390" y="140" width="150" height="62" rx="9" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="465" y="167" text-anchor="middle">Airports</text>
    <text x="465" y="186" text-anchor="middle" font-size="10" font-weight="400" fill="#3b82f6">IATA master</text>
    <rect x="560" y="140" width="150" height="62" rx="9" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="635" y="167" text-anchor="middle">Carriers</text>
    <text x="635" y="186" text-anchor="middle" font-size="10" font-weight="400" fill="#3b82f6">carrier master</text>
    <rect x="730" y="140" width="150" height="62" rx="9" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="805" y="167" text-anchor="middle">Weather</text>
    <text x="805" y="186" text-anchor="middle" font-size="10" font-weight="400" fill="#3b82f6">daily by airport</text>
  </g>
  <path d="M550,202 L550,232" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Ingestion -->
  <rect x="220" y="234" width="660" height="60" rx="9" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2"/>
  <text x="550" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#0f766e">Python Ingestion — extract + load  (Talend-style)</text>
  <text x="550" y="280" text-anchor="middle" font-size="11" fill="#0d9488">idempotent full-refresh · adds audit columns · writes ingestion-audit log</text>
  <path d="M550,294 L550,324" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Raw -->
  <rect x="220" y="326" width="660" height="58" rx="9" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="550" y="351" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">RAW schema  (landing zone)</text>
  <text x="550" y="371" text-anchor="middle" font-size="11" fill="#475569">DuckDB — local  •  Snowflake — cloud   (identical SQL via dbt)</text>
  <path d="M550,384 L550,414" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- dbt container -->
  <rect x="220" y="416" width="660" height="170" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="240" y="440" font-size="14" font-weight="700" fill="#b45309">dbt — SQL transformations, tests &amp; docs</text>
  <g>
    <rect x="236" y="452" width="196" height="118" rx="8" fill="#fff" stroke="#f59e0b"/>
    <text x="334" y="486" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Staging</text>
    <text x="334" y="508" text-anchor="middle" font-size="10.5" fill="#a16207">clean · de-dupe</text>
    <text x="334" y="524" text-anchor="middle" font-size="10.5" fill="#a16207">standardize · null</text>
    <text x="334" y="540" text-anchor="middle" font-size="10.5" fill="#a16207">sentinels · drop</text>
    <text x="334" y="556" text-anchor="middle" font-size="10.5" fill="#a16207">orphan airports</text>

    <rect x="452" y="452" width="196" height="118" rx="8" fill="#fff" stroke="#f59e0b"/>
    <text x="550" y="486" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Dimensions + Facts</text>
    <text x="550" y="510" text-anchor="middle" font-size="10.5" fill="#a16207">dim_date · dim_airport</text>
    <text x="550" y="526" text-anchor="middle" font-size="10.5" fill="#a16207">dim_airline</text>
    <text x="550" y="546" text-anchor="middle" font-size="10.5" fill="#a16207">fact_flights ·</text>
    <text x="550" y="562" text-anchor="middle" font-size="10.5" fill="#a16207">fact_flight_delays</text>

    <rect x="668" y="452" width="196" height="118" rx="8" fill="#fff" stroke="#f59e0b"/>
    <text x="766" y="486" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Analytics Marts</text>
    <text x="766" y="510" text-anchor="middle" font-size="10.5" fill="#a16207">route_performance</text>
    <text x="766" y="526" text-anchor="middle" font-size="10.5" fill="#a16207">delay_trends</text>
    <text x="766" y="542" text-anchor="middle" font-size="10.5" fill="#a16207">cancellations</text>
    <text x="766" y="558" text-anchor="middle" font-size="10.5" fill="#a16207">operational_kpis</text>

    <path d="M432,511 L450,511" stroke="#b45309" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M648,511 L666,511" stroke="#b45309" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <path d="M550,586 L550,616" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Consumption -->
  <text x="550" y="636" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">CONSUMPTION</text>
  <rect x="300" y="646" width="230" height="60" rx="9" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="415" y="672" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">Power BI</text>
  <text x="415" y="691" text-anchor="middle" font-size="10.5" fill="#16a34a">semantic model + DAX</text>
  <rect x="570" y="646" width="230" height="60" rx="9" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="685" y="672" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">Streamlit</text>
  <text x="685" y="691" text-anchor="middle" font-size="10.5" fill="#16a34a">live dashboard</text>

  <!-- Legend -->
  <text x="30" y="700" font-size="12" font-weight="700" fill="#334155">Stack</text>
  <text x="30" y="722" font-size="11.5" fill="#475569">Python · SQL · dbt · Great Expectations · Airflow · DuckDB/Snowflake · Power BI · Docker</text>
  <text x="30" y="742" font-size="11" fill="#64748b">Grain: one row per flight · Star schema · 30 dbt tests + 25 GE checks · source-to-target reconciliation</text>
</svg>
